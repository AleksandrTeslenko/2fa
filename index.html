<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>2FA</title>
    <style>
        body {
            font-size: 16px;
            color: #2c3e50;
            background: #2c3e50;
        }

        .container {
            margin: 5% auto;
            max-width: 1000px;
        }

        .card {
            padding: 1rem;
            border-radius: 10px;
            box-shadow: 2px 3px 10px rgba(0, 0, 0, 0.2);
            background: gainsboro;
            margin-top: 5px;
            text-align: center;
            font-size: 16px;
        }

        form {
            padding: 10px;
            border-radius: inherit;
            font-size: 18px;
            font-style: italic;
            font-weight: bold;
            display: inline-grid;
        }

        input {
            padding: 10px;
            border-radius: inherit;
            border-color: dimgray;
            border-width: thin;
            width: 300px;
            font-size: 18px;
        }

        .input_btn {
            cursor: pointer;
            width: 100px;
            min-width: 100px;
            padding: 8px;
            margin-top: 20px;
            position: relative;
            left: 110px;
        }
    </style>
</head>

<body>
    <div class="container" v-cloak>
        <div class="card">
            <h1>Two Factor Authentication (2FA) with Microsoft Authenticator</h1>
            <div v-html="myHtml"></div>
        </div>
        <div class="card">
            <form action="2fa.php" method="post" name="form">
                <p>Login</p>
                <input name="login" class="inp">
                <p>Password</p>
                <input name="password">
                <input id="send" type="submit" tabindex="3" value="Send" class="input_btn">
            </form>
        </div>
    </div>
</body>

</html>
